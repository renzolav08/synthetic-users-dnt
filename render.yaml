services:
  - type: web
    name: synthetic-users-dnt-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install numpy==1.26.4 --only-binary=:all: && pip install -r requirements.txt --only-binary=:all:
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: OPENAI_API_KEY
        sync: false

services:
  - type: web
    name: synthetic-users-dnt
    env: python

    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: OPENAI_API_KEY
        sync: false

      - key: TAVILY_API_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: false